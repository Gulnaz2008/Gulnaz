<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaaS - Личные сообщения</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(155, 89, 182, 0.15);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .auth-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid #eee; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #9c27b0; object-fit: cover; }
        
        button { cursor: pointer; transition: 0.3s; font-weight: 600; border-radius: 8px; padding: 12px; border: none; }
        #loginBtn { background: #007bff; color: white; width: 100%; font-size: 16px; }
        .logout-btn { background: #ff4757; color: white; padding: 8px 15px; font-size: 12px; }

        input { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #f3e5f5; border-radius: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #ba68c8; }
        
        #mainBtn { background: linear-gradient(45deg, #ba68c8, #9c27b0); color: white; width: 100%; }

        /* Стили чата */
        .section-title { color: #4a148c; text-align: center; margin-top: 0; font-size: 18px; margin-bottom: 15px; }
        #usersList { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: thin; }
        .user-card { text-align: center; cursor: pointer; min-width: 70px; transition: 0.2s; }
        .user-card:hover { transform: translateY(-3px); }
        .user-card img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #e1bee7; object-fit: cover; background: #eee; }
        .user-card.active img { border-color: #9c27b0; box-shadow: 0 0 10px rgba(156, 39, 176, 0.3); }
        .user-card div { font-size: 11px; margin-top: 5px; color: #444; font-weight: 500; }

        #messagesDisplay { 
            height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; 
            padding: 15px; background: #fdfbff; border-radius: 15px; border: 1px solid #f3e5f5;
        }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 75%; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .msg.sent { align-self: flex-end; background: #9c27b0; color: white; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: #f1f0f0; color: #333; border-bottom-left-radius: 2px; }

        .post { background: white; border-radius: 15px; padding: 18px; margin-top: 15px; width: 100%; border: 1px solid #eee; box-sizing: border-box; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-avatar { width: 35px; height: 35px; border-radius: 50%; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
        .like-btn { cursor: pointer; background: #fffafa; border: 1px solid #f3e5f5; padding: 6px 15px; border-radius: 20px; color: #8e24aa; font-size: 13px; }
    </style>
</head>
<body>

<div id="authSection" class="container" style="text-align: center;">
    <button id="loginBtn">Войти через Google 🚀</button>
    <div id="userInfo" style="display: none;" class="auth-bar">
        <img id="userPhoto" class="user-avatar" src="" alt="">
        <div style="flex-grow: 1; text-align: left;">
            <div id="userName" style="font-weight: bold; font-size: 14px;"></div>
            <div style="font-size: 10px; color: green;">Онлайн</div>
        </div>
        <button id="logoutBtn" class="logout-btn">Выйти</button>
    </div>
</div>

<div id="dmSection" class="container" style="display: none;">
    <h3 class="section-title">💬 Личные сообщения</h3>
    <div id="usersList">
        </div>
    
    <div id="chatWindow" style="display: none; border-top: 1px solid #eee; pt: 15px;">
        <div id="chatHeader" style="font-size: 13px; font-weight: bold; color: #9c27b0; margin-bottom: 10px;"></div>
        <div id="messagesDisplay"></div>
        <div style="display: flex; gap: 8px; margin-top: 12px;">
            <input type="text" id="dmInput" placeholder="Напишите сообщение..." style="margin: 0;">
            <button id="sendDmBtn" style="background: #9c27b0; color: white; width: 55px; display: flex; align-items: center; justify-content: center;">➤</button>
        </div>
    </div>
</div>

<div id="messageForm" class="container" style="display: none;">
    <h3 class="section-title">✨ Создать пост</h3>
    <input type="text" id="content" placeholder="О чем вы думаете?">
    <input type="text" id="photoUrlInput" placeholder="Ссылка на картинку (необязательно)">
    <button id="mainBtn">Опубликовать в ленту</button>
</div>

<div id="feed" style="width: 100%; max-width: 550px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWQP2kf_fpAidqN68FIRxYCYVaHhdabgI",
        authDomain: "gulnaz-a1c58.firebaseapp.com",
        projectId: "gulnaz-a1c58",
        storageBucket: "gulnaz-a1c58.firebasestorage.app",
        messagingSenderId: "55261769559",
        appId: "1:55261769559:web:f8b87fe5e36dd449f49812"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let activeChatPartnerId = null;
    let unsubscribeMessages = null;

    // --- АВТОРИЗАЦИЯ ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('messageForm').style.display = 'block';
            document.getElementById('dmSection').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userPhoto').src = user.photoURL;
            loadUsersForChat();
        } else {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('messageForm').style.display = 'none';
            document.getElementById('dmSection').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

    // --- ПОСТЫ ---
    document.getElementById('mainBtn').onclick = async () => {
        const text = document.getElementById('content').value.trim();
        const img = document.getElementById('photoUrlInput').value.trim();
        if(!text) return alert("Введите текст поста!");

        await addDoc(collection(db, "requests"), {
            uid: auth.currentUser.uid,
            name: auth.currentUser.displayName,
            photo: auth.currentUser.photoURL,
            postImage: img,
            text: text,
            likes: 0,
            timestamp: serverTimestamp()
        });
        document.getElementById('content').value = "";
        document.getElementById('photoUrlInput').value = "";
    };

    onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snaps) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snaps.forEach(d => {
            const data = d.data();
            const div = document.createElement('div');
            div.className = 'post';
            div.innerHTML = `
                <div class="post-header">
                    <img src="${data.photo}" class="post-avatar">
                    <b style="font-size:14px">${data.name}</b>
                </div>
                <div style="font-size:15px; color:#333">${data.text}</div>
                ${data.postImage ? `<img src="${data.postImage}" class="post-img" onerror="this.remove()">` : ''}
                <div style="margin-top:10px">
                    <button class="like-btn" onclick="window.likePost('${d.id}')">👍 ${data.likes || 0}</button>
                </div>
            `;
            feed.appendChild(div);
        });
    });

    window.likePost = (id) => updateDoc(doc(db, "requests", id), { likes: increment(1) });

    // --- ЛОГИКА ЧАТА ---
    function loadUsersForChat() {
        // Берем список людей из постов (все, кроме меня)
        onSnapshot(collection(db, "requests"), (snaps) => {
            const list = document.getElementById('usersList');
            list.innerHTML = "";
            const addedUids = new Set();

            snaps.forEach(d => {
                const u = d.data();
                if (u.uid && u.uid !== auth.currentUser.uid && !addedUids.has(u.uid)) {
                    addedUids.add(u.uid);
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    if(activeChatPartnerId === u.uid) card.classList.add('active');
                    card.innerHTML = `<img src="${u.photo}"><div>${u.name.split(' ')[0]}</div>`;
                    card.onclick = () => openChat(u.uid, u.name);
                    list.appendChild(card);
                }
            });
        });
    }

    function openChat(partnerId, partnerName) {
        activeChatPartnerId = partnerId;
        document.getElementById('chatWindow').style.display = 'block';
        document.getElementById('chatHeader').innerText = "Переписка с " + partnerName;
        loadUsersForChat(); // Обновить активную карточку

        if (unsubscribeMessages) unsubscribeMessages();

        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        unsubscribeMessages = onSnapshot(q, (snaps) => {
            const display = document.getElementById('messagesDisplay');
            display.innerHTML = "";
            snaps.forEach(d => {
                const m = d.data();
                const myUid = auth.currentUser.uid;
                // Показываем сообщение только если оно принадлежит этой паре
                if ((m.senderId === myUid && m.receiverId === partnerId) || 
                    (m.senderId === partnerId && m.receiverId === myUid)) {
                    const div = document.createElement('div');
                    div.className = `msg ${m.senderId === myUid ? 'sent' : 'received'}`;
                    div.innerText = m.text;
                    display.appendChild(div);
                }
            });
            display.scrollTop = display.scrollHeight;
        });
    }

    document.getElementById('sendDmBtn').onclick = async () => {
        const input = document.getElementById('dmInput');
        const text = input.value.trim();
        if (!text || !activeChatPartnerId) return;

        await addDoc(collection(db, "messages"), {
            senderId: auth.currentUser.uid,
            receiverId: activeChatPartnerId,
            text: text,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };
</script>
</body>
</html>

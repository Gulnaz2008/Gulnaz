<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов - Gulnaz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #4a148c; }
        
        .card { background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 30px; width: 100%; max-width: 500px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(155, 89, 182, 0.15); text-align: center; backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        h2 { color: #9c27b0; font-weight: bold; font-size: 24px; margin-bottom: 20px; }
        
        .buttons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        
        .status-btn { padding: 16px; border: none; border-radius: 15px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .status-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        .btn-study { background: #4CAF50; }
        .btn-coffee { background: #FFC107; color: #333; }
        .btn-game { background: #17a2b8; }
        .btn-rest { background: #ff4757; }

        .user-item { display: flex; align-items: center; padding: 15px; background: white; border-radius: 20px; margin-bottom: 10px; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status-dot { width: 15px; height: 15px; border-radius: 50%; margin-right: 15px; }
        
        #myInfo { color: #7b1fa2; font-weight: bold; margin-bottom: 15px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <div id="myInfo">Загрузка...</div>
        <div class="buttons-grid">
            <button class="status-btn btn-study" onclick="changeStatus('📚 Учусь', '#4CAF50')">📚 Учусь</button>
            <button class="status-btn btn-coffee" onclick="changeStatus('☕ Отдыхаю', '#FFC107')">☕ Отдых</button>
            <button class="status-btn btn-game" onclick="changeStatus('🎮 В игре', '#17a2b8')">🎮 В игре</button>
            <button class="status-btn btn-rest" onclick="changeStatus('😴 Сплю', '#ff4757')">😴 Сплю</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="groupList">Синхронизация...</div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // ТВОИ АКТУАЛЬНЫЕ ДАННЫЕ
        const URL = 'https://urxuxcaijnyagknanogv.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyeHV4Y2Fpam55YWdrbmFub2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODA2MTAsImV4cCI6MjA5MjI1NjYxMH0.a4VMlgaEiZknBNl-eazc6Ry37syVjnKanPtn14F7XeA';
        const supabase = createClient(URL, KEY);

        // ТВОЙ ID
        const MY_ID = '4bc5694e-89f8-47d9-9b60-2d3bd2439122';

        window.changeStatus = async (statusText, colorCode) => {
            const { error } = await supabase
                .from('Gulnaz') // Правильное название таблицы
                .update({ 
                    status: statusText, 
                    color: colorCode 
                })
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка обновления: " + error.message);
                console.error(error);
            } else {
                fetchGroup();
            }
        };

        async function fetchGroup() {
            const { data, error } = await supabase
                .from('Gulnaz')
                .select('*')
                .order('username', { ascending: true });

            if (error) return console.error(error);

            const list = document.getElementById('groupList');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div>
                        <strong style="color: #9c27b0;">${user.username}</strong><br>
                        <small style="color: #666;">${user.status || 'Нет статуса'}</small>
                    </div>
                </div>
            `).join('');

            const me = data.find(u => u.id === MY_ID);
            if (me) {
                document.getElementById('myInfo').innerText = `Привет, ${me.username}! ✨`;
            }
        }

        fetchGroup();
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>

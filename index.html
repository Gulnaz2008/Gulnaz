<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления данными</title>

    <style>
        /* Глобальное правило: предотвращает "кривизну" размеров */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 480px; /* Оптимальная ширина */
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        h3 {
            text-align: center;
            color: #6a11cb;
            margin-bottom: 20px;
            font-size: 22px;
        }

        /* Поля ввода теперь будут всегда внутри контейнера */
        input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #6a11cb;
            box-shadow: 0 0 8px rgba(106, 17, 203, 0.2);
        }

        #mainBtn {
            width: 100%;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            font-weight: bold;
            font-size: 16px;
            border: none;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        #mainBtn:active {
            transform: scale(0.98);
        }

        /* Стили для ленты постов */
        #feed {
            width: 100%;
            max-width: 480px;
        }

        .post {
            background: white;
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .postHeader {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .userInfo b { color: #333; font-size: 16px; }
        .userInfo small { color: #888; }

        .like-btn {
            background: #f3e8ff;
            color: #6a11cb;
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin: 10px 0;
        }

        .comment-area {
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .sendBtn {
            background: #6a11cb;
            color: white;
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .comments p {
            background: #f9f7ff;
            padding: 10px;
            border-radius: 10px;
            margin: 8px 0;
            font-size: 14px;
            border-left: 4px solid #6a11cb;
        }
    </style>
</head>

<body>

<div class="container">
    <h3>💜 Панель управления данными</h3>

    <input id="name" placeholder="Имя">
    <input id="email" placeholder="Email">

    <button id="mainBtn">Опубликовать</button>
</div>

<div id="feed"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления данными</title>
    <style>
        /* 1. Глобальная защита от "кривизны" */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Общий контейнер для формы и ленты */
        .container, #feed {
            width: 100%;
            max-width: 480px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        h3 {
            text-align: center;
            color: #6a11cb;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 16px;
        }

        input:focus {
            border-color: #6a11cb;
        }

        #mainBtn {
            width: 100%;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            font-weight: bold;
            border: none;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Стили постов */
        .post {
            background: white;
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .postHeader {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .userInfo b { color: #333; }
        .userInfo small { color: #888; }

        .like-btn {
            background: #f3e8ff;
            color: #6a11cb;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 10px 0;
        }

        .comment-area {
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 10px;
        }

        .sendBtn {
            background: #6a11cb;
            color: white;
            width: 100%;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 5px;
        }

        .comments p {
            background: #f9f7ff;
            padding: 8px 12px;
            border-radius: 10px;
            margin: 8px 0;
            font-size: 14px;
            border-left: 3px solid #6a11cb;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>💜 Панель управления данными</h3>
    <input id="name" placeholder="Имя">
    <input id="email" placeholder="Email">
    <button id="mainBtn">Опубликовать</button>
</div>

<div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
    getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
    serverTimestamp, updateDoc, doc, increment, arrayUnion
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_SENDER",
    appId: "YOUR_APP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Функции лайка и коммента (привязываем к window, чтобы работали из HTML-строки)
window.likePost = async (id) => {
    const ref = doc(db, "requests", id);
    await updateDoc(ref, { likes: increment(1) });
};

window.addComment = async (id, text) => {
    const ref = doc(db, "requests", id);
    await updateDoc(ref, {
        comments: arrayUnion({ text: text })
    });
};

// Логика создания поста
document.getElementById("mainBtn").onclick = async () => {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();

    if (!name || !email) return;

    await addDoc(collection(db, "requests"), {
        name,
        email,
        likes: 0,
        comments: [],
        timestamp: serverTimestamp()
    });

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
};

// Отображение ленты
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snap) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snap.forEach((d) => {
        const data = d.data();
        const avatarLetter = data.name ? data.name[0].toUpperCase() : "?";
        const post = document.createElement("div");
        post.className = "post";

        post.innerHTML = `
            <div class="postHeader">
                <div class="avatar">${avatarLetter}</div>
                <div class="userInfo">
                    <b>${data.name}</b><br>
                    <small>${data.email}</small>
                </div>
            </div>
            <button class="like-btn">💜 ${data.likes || 0}</button>
            <div class="comment-area">
                <input class="commentInput" placeholder="Написать комментарий...">
                <button class="sendBtn">Отправить</button>
                <div class="comments">
                    ${(data.comments || []).map(c => `<p>💬 ${c.text}</p>`).join("")}
                </div>
            </div>
        `;

        // Обработчики событий
        post.querySelector(".like-btn").onclick = () => window.likePost(d.id);
        post.querySelector(".sendBtn").onclick = () => {
            const input = post.querySelector(".commentInput");
            if (!input.value.trim()) return;
            window.addComment(d.id, input.value.trim());
            input.value = "";
        };

        feed.appendChild(post);
    });
});
</script>

</body>
</html>

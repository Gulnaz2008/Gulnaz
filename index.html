<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaaS - Личные сообщения</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 550px; background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(155, 89, 182, 0.15); margin-bottom: 20px; box-sizing: border-box; }
        .auth-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid #eee; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #9c27b0; object-fit: cover; }
        button { cursor: pointer; transition: 0.3s; font-weight: 600; border-radius: 8px; padding: 12px; border: none; }
        #loginBtn { background: #007bff; color: white; width: 100%; }
        .logout-btn { background: #ff4757; color: white; padding: 8px 15px; font-size: 12px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #f3e5f5; border-radius: 12px; box-sizing: border-box; outline: none; }
        #mainBtn { background: linear-gradient(45deg, #ba68c8, #9c27b0); color: white; width: 100%; }
        #usersList { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; }
        .user-card { text-align: center; cursor: pointer; min-width: 70px; }
        .user-card img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #e1bee7; }
        .user-card.active img { border-color: #9c27b0; border-width: 3px; }
        #messagesDisplay { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px; background: #fdfbff; border-radius: 15px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 75%; font-size: 14px; }
        .msg.sent { align-self: flex-end; background: #9c27b0; color: white; }
        .msg.received { align-self: flex-start; background: #f1f0f0; color: #333; }
        .post { background: white; border-radius: 15px; padding: 18px; margin-top: 15px; width: 100%; box-sizing: border-box; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="authSection" class="container" style="text-align: center;">
    <button id="loginBtn">Войти через Google</button>
    <div id="userInfo" style="display: none;" class="auth-bar">
        <img id="userPhoto" class="user-avatar" src="" alt="">
        <div style="flex-grow: 1; text-align: left;">
            <b id="userName"></b>
            <div style="font-size: 10px; color: green;">Онлайн</div>
        </div>
        <button id="logoutBtn" class="logout-btn">Выйти</button>
    </div>
</div>

<div id="dmSection" class="container" style="display: none;">
    <h3 style="color: #4a148c; text-align: center;">💬 Личные сообщения</h3>
    <div id="usersList"></div>
    <div id="chatWindow" style="display: none;">
        <div id="messagesDisplay"></div>
        <div style="display: flex; gap: 8px; margin-top: 10px;">
            <input type="text" id="dmInput" placeholder="Ваше сообщение...">
            <button id="sendDmBtn" style="background: #9c27b0; color: white;">➤</button>
        </div>
    </div>
</div>

<div id="messageForm" class="container" style="display: none;">
    <h3 style="color: #4a148c; text-align: center;">✨ Создать пост</h3>
    <input type="text" id="content" placeholder="Текст поста...">
    <input type="text" id="photoUrlInput" placeholder="Ссылка на фото...">
    <button id="mainBtn">Опубликовать</button>
</div>

<div id="feed" style="width: 100%; max-width: 550px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWQP2kf_fpAidqN68FIRxYCYVaHhdabgI",
        authDomain: "gulnaz-a1c58.firebaseapp.com",
        projectId: "gulnaz-a1c58",
        storageBucket: "gulnaz-a1c58.firebasestorage.app",
        messagingSenderId: "55261769559",
        appId: "1:55261769559:web:f8b87fe5e36dd449f49812"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let activePartnerId = null;
    let unsubMsgs = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('messageForm').style.display = 'block';
            document.getElementById('dmSection').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userPhoto').src = user.photoURL;
            loadUsers();
        } else {
            location.reload();
        }
    });

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // --- ЛОГИКА ПОСТОВ ---
    document.getElementById('mainBtn').onclick = async () => {
        const text = document.getElementById('content').value;
        if(!text) return;
        await addDoc(collection(db, "requests"), {
            uid: auth.currentUser.uid,
            name: auth.currentUser.displayName,
            photo: auth.currentUser.photoURL,
            text: text,
            postImage: document.getElementById('photoUrlInput').value,
            likes: 0,
            timestamp: serverTimestamp()
        });
        document.getElementById('content').value = "";
    };

    onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snaps) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snaps.forEach(d => {
            const data = d.data();
            const post = document.createElement('div');
            post.className = 'post';
            post.innerHTML = `<div class="post-header"><img src="${data.photo}" class="post-avatar"><b>${data.name}</b></div>
            <p>${data.text}</p>${data.postImage ? `<img src="${data.postImage}" class="post-img">`:''}`;
            feed.appendChild(post);
        });
    });

    // --- ЛОГИКА ЧАТА ---
    function loadUsers() {
        onSnapshot(collection(db, "requests"), (snaps) => {
            const list = document.getElementById('usersList');
            list.innerHTML = "";
            const seen = new Set();
            snaps.forEach(d => {
                const u = d.data();
                if (u.uid && u.uid !== auth.currentUser.uid && !seen.has(u.uid)) {
                    seen.add(u.uid);
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `<img src="${u.photo}"><div>${u.name.split(' ')[0]}</div>`;
                    card.onclick = () => startChat(u.uid, u.name);
                    list.appendChild(card);
                }
            });
        });
    }

    function startChat(id, name) {
        activePartnerId = id;
        document.getElementById('chatWindow').style.display = 'block';
        if(unsubMsgs) unsubMsgs();
        
        unsubMsgs = onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snaps) => {
            const disp = document.getElementById('messagesDisplay');
            disp.innerHTML = "";
            snaps.forEach(d => {
                const m = d.data();
                if ((m.senderId === auth.currentUser.uid && m.receiverId === id) || 
                    (m.senderId === id && m.receiverId === auth.currentUser.uid)) {
                    const mDiv = document.createElement('div');
                    mDiv.className = `msg ${m.senderId === auth.currentUser.uid ? 'sent' : 'received'}`;
                    mDiv.innerText = m.text;
                    disp.appendChild(mDiv);
                }
            });
            disp.scrollTop = disp.scrollHeight;
        });
    }

    document.getElementById('sendDmBtn').onclick = async () => {
        const input = document.getElementById('dmInput');
        if(!input.value || !activePartnerId) return;
        try {
            await addDoc(collection(db, "messages"), {
                senderId: auth.currentUser.uid,
                receiverId: activePartnerId,
                text: input.value,
                timestamp: serverTimestamp()
            });
            input.value = "";
        } catch(e) { alert("Ошибка отправки! Проверьте Rules в Firebase."); }
    };
</script>
</body>
</html>

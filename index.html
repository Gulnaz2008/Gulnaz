<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой статус | Gulnaz Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3e8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 20px;
        }
        h2 { color: #a21caf; margin-top: 0; }
        .btn-google {
            background: white;
            border: 1px solid #dadce0;
            color: #3c4043;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }
        .btn-google:hover { background: #f8f9fa; }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        .status-btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .status-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .status-btn:active { transform: scale(0.98); }
        .monitor-list {
            text-align: left;
            margin-top: 15px;
        }
        .monitor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #fafafa;
            border-left: 5px solid #ccc;
        }
        .user-name { font-weight: 600; color: #333; }
        .user-status { padding: 4px 10px; border-radius: 20px; color: white; font-size: 14px; font-weight: bold; }
        .loading { color: #888; font-style: italic; }
        .logout-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="auth-container" class="card">
        <h2>Мой профиль</h2>
        <button class="btn-google" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 18 18">
                <path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.73 2.11c1.6-1.48 2.52-3.66 2.52-6.44z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.73-2.11c-.76.51-1.73.81-2.93.81-2.26 0-4.17-1.53-4.85-3.58L1.64 13.1c1.48 2.94 4.53 4.9 8.04 4.9z" fill="#34A853"/>
                <path d="M4.15 10.94A5.4 5.4 0 0 1 3.86 9c0-.68.11-1.35.33-1.94L1.39 4.88A8.99 8.99 0 0 0 0 9c0 1.5.37 2.93 1.02 4.2l3.13-2.26z" fill="#FBBC05"/>
                <path d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.3C13.46.86 11.43 0 9 0 5.49 0 2.44 1.96.96 4.9L4.15 7.1C4.83 5.05 6.74 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Войти через Google
        </button>
    </div>

    <div id="profile-container" class="card" style="display: none;">
        <h2 id="welcome-text">Привет!</h2>
        <div class="status-grid">
            <button class="status-btn" style="background-color: #10b981;" onclick="updateStatus('📚 Учусь', '#10b981')">📚 Учусь</button>
            <button class="status-btn" style="background-color: #3b82f6;" onclick="updateStatus('💻 Кодю', '#3b82f6')">💻 Кодю</button>
            <button class="status-btn" style="background-color: #f59e0b;" onclick="updateStatus('☕ Отдых', '#f59e0b')">☕ Отдых</button>
            <button class="status-btn" style="background-color: #ec4899;" onclick="updateStatus('🎮 В игре', '#ec4899')">🎮 В игре</button>
        </div>
        <button class="logout-btn" onclick="logout()">Выйти из аккаунта</button>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="monitor-container" class="monitor-list">
            <div class="loading">Загрузка данных...</div>
        </div>
    </div>

    <script>
        // === НАСТРОЙКИ SUPABASE ===
        // TODO: ЗАМЕНИ ЭТИ ДВЕ СТРОЧКИ НА СВОИ ИЗ НАСТРОЕК SUPABASE (Settings -> API)
        const SUPABASE_URL = "https://urxuxcaijnyagknanogv.supabase.co"; 
        const SUPABASE_ANON_KEY = "ВСТАВЬ_СЮДА_СВОЙ_ANON_KEY"; 

        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        // Инициализация при загрузке страницы
        async function init() {
            // Проверяем, залогинен ли пользователь на данный момент
            const { data: { session } } = await supabase.auth.getSession();
            handleAuthChange(session);

            // Слушаем изменения авторизации (например, возврат от Google)
            supabase.auth.onAuthStateChange((event, session) => {
                handleAuthChange(session);
            });

            // Сразу загружаем общие статусы для монитора
            loadMonitorData();
        }

        // Обработка переключения экранов Вход / Профиль
        function handleAuthChange(session) {
            if (session && session.user) {
                currentUser = session.user;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('profile-container').style.display = 'block';
                document.getElementById('welcome-text').innerText = `Привет, ${currentUser.email.split('@')[0]}!`;
            } else {
                currentUser = null;
                document.getElementById('auth-container').style.display = 'block';
                document.getElementById('profile-container').style.display = 'none';
            }
        }

        // Запуск авторизации через Google
        async function loginWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + window.location.pathname
                }
            });
            if (error) alert("Ошибка авторизации: " + error.message);
        }

        // Выход из аккаунта
        async function logout() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        // Обновление своего статуса в базе данных
        async function updateStatus(statusText, colorCode) {
            if (!currentUser) return alert("Вы не авторизованы!");

            const { error } = await supabase
                .from('Gulnaz')
                .update({ 
                    status: statusText, 
                    color: colorCode 
                })
                .eq('id', currentUser.id); // Обновляем строку, где id равен твоему UID

            if (error) {
                console.error("Ошибка обновления статуса:", error);
                alert("Не удалось обновить статус. Убедись, что твой UID прописан в таблице базы данных!");
            } else {
                // После успешного обновления перерисовываем монитор
                loadMonitorData();
            }
        }

        // Загрузка всех статусов для "Монитора группы"
        async function loadMonitorData() {
            const container = document.getElementById('monitor-container');
            
            const { data, error } = await supabase
                .from('Gulnaz')
                .select('*');

            if (error) {
                console.error("Ошибка загрузки монитора:", error);
                container.innerHTML = `<div style="color:red;">Ошибка загрузки данных.</div>`;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = `<div>Таблица пуста.</div>`;
                return;
            }

            // Рендерим строки таблицы
            container.innerHTML = '';
            data.forEach(row => {
                const item = document.createElement('div');
                item.className = 'monitor-item';
                item.style.borderLeftColor = row.color || '#ccc';

                const displayStatus = row.status ? row.status : '💤 Нет статуса';
                const displayColor = row.color ? row.color : '#999';

                item.innerHTML = `
                    <span class="user-name">${row.username || 'Аноним'}</span>
                    <span class="user-status" style="background-color: ${displayColor}">${displayStatus}</span>
                `;
                container.appendChild(item);
            });
        }

        // Запуск скрипта при загрузке страницы
        window.onload = init;
    </script>
</body>
</html>

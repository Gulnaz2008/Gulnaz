<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Purple Social Firebase</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.container {
    width: 100%;
    max-width: 500px;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h3 {
    text-align: center;
    color: #6a11cb;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    padding: 10px;
}

#mainBtn {
    width: 100%;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    font-weight: bold;
}

.post {
    width: 100%;
    max-width: 500px;
    background: white;
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
}

.like-btn {
    background: #f3e8ff;
    color: #6a11cb;
    padding: 6px 12px;
    border-radius: 20px;
    margin-top: 5px;
}

.commentInput {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    border-radius: 8px;
}

.sendBtn {
    background: #6a11cb;
    color: white;
    margin-top: 5px;
    width: 100%;
}

.comments p {
    background: #f3e8ff;
    padding: 5px 8px;
    border-radius: 8px;
    margin: 5px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.deleteComment {
    background: red;
    color: white;
    border-radius: 5px;
    padding: 2px 6px;
    font-size: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h3>💜 Purple Firebase Feed</h3>

    <input id="name" placeholder="Имя">
    <input id="email" placeholder="Email">

    <button id="mainBtn">Опубликовать</button>
</div>

<div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
serverTimestamp,
updateDoc,
doc,
increment,
arrayUnion,
arrayRemove
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_SENDER",
appId: "YOUR_APP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👍 лайк
window.likePost = async (id) => {
const ref = doc(db, "requests", id);
await updateDoc(ref, { likes: increment(1) });
};

// 💬 комментарий
window.addComment = async (id, text) => {
const ref = doc(db, "requests", id);
await updateDoc(ref, {
comments: arrayUnion({
id: Date.now(),
text: text
})
});
};

// ❌ УДАЛЕНИЕ КОММЕНТАРИЯ (НОВАЯ ФУНКЦИЯ)
window.deleteComment = async (postId, comment) => {
const ref = doc(db, "requests", postId);
await updateDoc(ref, {
comments: arrayRemove(comment)
});
};

// ➕ POST
document.getElementById("mainBtn").onclick = async () => {
const name = document.getElementById("name").value;
const email = document.getElementById("email").value;

await addDoc(collection(db, "requests"), {
name,
email,
likes: 0,
comments: [],
timestamp: serverTimestamp()
});

document.getElementById("name").value = "";
document.getElementById("email").value = "";
};

// 📡 FEED
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snap) => {
const feed = document.getElementById("feed");
feed.innerHTML = "";

snap.forEach((d) => {
const data = d.data();

const post = document.createElement("div");
post.className = "post";

post.innerHTML = `
<b>${data.name}</b>
<p>${data.email}</p>

<button class="like-btn">💜 ${data.likes}</button>

<input class="commentInput" placeholder="Комментарий...">
<button class="sendBtn">Отправить</button>

<div class="comments">
${(data.comments || []).map(c => `
<p>
💬 ${c.text}
<button class="deleteCommentBtn">x</button>
</p>
`).join("")}
</div>
`;

post.querySelector(".like-btn").onclick = () => likePost(d.id);

post.querySelector(".sendBtn").onclick = () => {
const input = post.querySelector(".commentInput");
if (!input.value) return;
addComment(d.id, input.value);
input.value = "";
};

// ❌ удалить комментарий
post.querySelectorAll(".deleteCommentBtn").forEach((btn, i) => {
btn.onclick = async () => {
const comment = data.comments[i];
await deleteComment(d.id, comment);
};
});

feed.appendChild(post);
});
});
</script>

</body>
</html>

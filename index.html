<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов 🔮</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f3f0f7; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            color: #4a3e4d;
        }
        
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(157, 78, 221, 0.2); 
        }

        h2 { text-align: center; color: #7b2cbf; font-weight: 700; margin: 20px 0 10px 0; }
        h2:first-child { margin-top: 0; }

        .my-profile { 
            background: #f7f4fa; 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            border: 1px dashed #c77dff; 
            text-align: center;
        }

        #myInfo { font-weight: bold; color: #5a189a; margin-bottom: 15px; }

        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        
        button { 
            padding: 12px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            color: white; 
            font-weight: 600; 
            font-family: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }

        .btn-google { background: #4285F4; width: 100%; margin-top: 10px; }
        .btn-coffee { background: #d8bbff; color: #3c096c; } 
        .btn-game { background: #9d4edd; }  
        .btn-home { background: #e0aaff; color: #3c096c; }

        /* Новые кнопки для сессии учебы */
        .btn-session-start { background: #2ecc71; grid-column: span 2; margin-top: 10px; font-size: 1.1em; }
        .btn-session-stop { background: #e74c3c; grid-column: span 2; margin-top: 10px; font-size: 1.1em; }
        
        hr { border: 0; height: 1px; background: #e0aaff; margin: 20px 0; }

        .user-item { 
            display: flex; 
            align-items: center; 
            padding: 12px; 
            background: #faf8fc;
            border-radius: 15px;
            margin-bottom: 10px;
            position: relative;
        }

        .status-dot { 
            width: 14px; 
            height: 14px; 
            border-radius: 50%; 
            margin-right: 15px; 
            border: 2px solid white; 
            box-shadow: 0 0 8px rgba(0,0,0,0.1); 
            position: relative;
        }

        .online-badge {
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            position: absolute;
            top: -2px;
            right: -2px;
            border: 1px solid white;
        }

        .user-info b { display: block; color: #3c096c; font-size: 1.05em; }
        .user-info span { font-size: 0.85em; color: #9d4edd; }
        
        .time-badge {
            margin-left: auto;
            font-size: 0.85em;
            background: #f3e8ff;
            padding: 4px 8px;
            border-radius: 10px;
            color: #7b2cbf;
            font-weight: bold;
        }

        /* Стили чата */
        .chat-box {
            background: #faf8fc;
            border: 1px solid #e0aaff;
            border-radius: 15px;
            padding: 15px;
            margin-top: 10px;
        }

        .chat-messages {
            height: 150px;
            overflow-y: auto;
            border-bottom: 1px solid #e0aaff;
            padding-bottom: 10px;
            margin-bottom: 10px;
            text-align: left;
            font-size: 0.9em;
        }

        .chat-msg { margin-bottom: 6px; line-height: 1.4; }
        .chat-msg b { color: #7b2cbf; }

        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input {
            font-family: inherit;
            flex: 1;
            padding: 10px;
            border: 1px solid #c77dff;
            border-radius: 10px;
            outline: none;
        }
        .btn-send { background: #7b2cbf; padding: 10px 15px; }

        /* СТИЛИ ДЛЯ АЧИВОК И ТОП-ЛИСТА */
        .badges-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        
        /* КРАСИВЫЙ СТИЛЬ ТЕКСТОВОЙ АЧИВКИ */
        .badge-tag { 
            display: inline-flex;
            align-items: center;
            background: #f3e8ff;
            border: 1px solid #d8bbff;
            color: #5a189a;
            font-size: 0.75em;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(157, 78, 221, 0.1);
        }
        
        .leaderboard-list { background: #f7f4fa; border-radius: 20px; padding: 15px; margin-bottom: 25px; border: 1px dashed #c77dff; }
        .leader-item { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px dashed #e0aaff; font-size: 0.95em; }
        .leader-item:last-child { border-bottom: none; }
        .leader-rank { font-weight: bold; color: #9d4edd; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Мой профиль</h2>
    <div class="my-profile">
        <div id="auth-box">
            <p id="myInfo">Загрузка...</p>
        </div>
        
        <div id="status-box" style="display: none;">
            <p id="myStudyTime" style="font-size: 16px; font-weight: bold; margin: 10px 0; color: #7b2cbf;"></p>
            
            <div id="myBadgesRow" style="margin-bottom: 12px; font-size: 14px; color: #3c096c;"></div>
            
            <div class="buttons">
                <button id="sessionBtn" class="btn-session-start" onclick="toggleStudySession()">🧠 Начать учебу</button>

                <button class="btn-coffee" onclick="changeStatus('☕ Кофе', '#d8bbff')">☕ Кофе</button>
                <button class="btn-game" onclick="changeStatus('🎮 В игре', '#9d4edd')">🎮 В игре</button>
                <button class="btn-home" onclick="changeStatus('👾 Отдых', '#e0aaff')">👾 Отдых</button>
            </div>
            <p style="margin-top: 15px;"><a href="#" onclick="logout()" style="color: #5a189a; font-size: 12px;">Выйти из аккаунта</a></p>
        </div>
    </div>

    <h2>👑 Топ студентов</h2>
    <div id="leaderboard" class="leaderboard-list"></div>

    <h2>📡 Монитор группы</h2>
    <div id="groupList"></div>

    <hr>
    <h2>💬 Общий чат</h2>
    <div class="chat-box">
        <div id="chatMessages" class="chat-messages"></div>
        <div id="chatInputArea" class="chat-input-row" style="display: none;">
            <input type="text" id="msgInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendChatMessage()">
            <button class="btn-send" onclick="sendChatMessage()">➔</button>
        </div>
        <p id="chatGuestNotice" style="font-size: 12px; color: #9d4edd; text-align: center;">Войдите, чтобы писать в чат</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // Твои настройки Supabase (Оставляем прежними, они верные)
    const SUPABASE_URL = 'https://aecurveycefurzgkloaq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1N6vKLVRSpJeWya6w7Aaig_-w5RA8yY';
    const sb_client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isStudying = false; // Флаг: учится ли пользователь прямо сейчас
    let currentSessionStartTime = null; // НОВАЯ ПЕРЕМЕННАЯ: для отслеживания марафона

    // ТЕКСТОВЫЕ НАЗВАНИЯ ДЛЯ ТВОИХ НАГРАД
    const BADGE_DETAILS = {
        'early': { text: '🌌 Ранняя пташка', title: 'Учеба начата до 8:00 утра' },
        'marathon': { text: '⚡ Марафонец', title: 'Непрерывная учеба более 2 часов' },
        'activist': { text: '🔮 Активист', title: 'Написано 20 сообщений в чате' }
    };

    // ОБНОВЛЕННАЯ ФУНКЦИЯ: Отрисовка наград в виде красивых текстовых плашек
    function renderBadges(badgesArray) {
        if (!badgesArray || badgesArray.length === 0) return '';
        return `<div class="badges-container">` + badgesArray.map(b => {
            const item = BADGE_DETAILS[b];
            return item ? `<span class="badge-tag" title="${item.title}">${item.text}</span>` : '';
        }).join('') + `</div>`;
    }

    async function login() {
        const { error } = await sb_client.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.href }
        });
        if (error) alert("Ошибка входа: " + error.message);
    }

    async function logout() {
        await sb_client.auth.signOut();
        window.location.reload();
    }

    function formatTime(seconds) {
        const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
        const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${h}:${m}:${s}`;
    }

    // Переключение сессии Учебы
    async function toggleStudySession() {
        const { data: { user } } = await sb_client.auth.getUser();
        if (!user) return alert("Сначала войдите!");

        const btn = document.getElementById('sessionBtn');
        
        if (!isStudying) {
            // Начинаем учебу
            isStudying = true;
            currentSessionStartTime = new Date(); // Запоминаем время старта сессии
            btn.innerText = "⏹ Завершить сессию";
            btn.className = "btn-session-stop";
            await changeStatus('📚 Учусь', '#9d4edd');
        } else {
            // Завершаем учебу
            isStudying = false;
            currentSessionStartTime = null; // Сбрасываем время сессии
            btn.innerText = "🧠 Начать учебу";
            btn.className = "btn-session-start";
            await changeStatus('👾 Отдых', '#e0aaff');
        }
    }

    async function changeStatus(statusText, statusColor) {
        const { data: { user } } = await sb_client.auth.getUser();
        if (!user) return;

        // Если принудительно переключили статус кнопками "Кофе/В игре/Дома", выключаем сессию учебы
        if (statusText !== '📚 Учусь' && isStudying) {
            isStudying = false;
            currentSessionStartTime = null;
            const btn = document.getElementById('sessionBtn');
            btn.innerText = "🧠 Начать учебу";
            btn.className = "btn-session-start";
        }

        const name = user.user_metadata.full_name || user.email.split('@')[0];

        // НОВАЯ ФУНКЦИЯ: Проверка ачивки "Ранняя пташка" перед сохранением
        let currentBadges = [];
        const { data: profile } = await sb_client.from('profiles').select('badges').eq('id', user.id).single();
        if (profile && profile.badges) currentBadges = profile.badges;

        if (statusText === '📚 Учусь') {
            const currentHour = new Date().getHours();
            if (currentHour < 8 && !currentBadges.includes('early')) {
                currentBadges.push('early');
                alert("Поздравляем! Вы получили значок 🌌 Ранняя пташка!");
            }
        }

        await sb_client.from('profiles').upsert({ 
            id: user.id, 
            username: name, 
            status: statusText, 
            color: statusColor,
            last_seen: new Date().toISOString(),
            badges: currentBadges // Сохраняем ачивки
        });

        fetchGroup();
    }

    async function fetchGroup() {
        const { data, error } = await sb_client.from('profiles').select('*').order('username');
        if (error) return;

        const listContainer = document.getElementById('groupList');
        const leaderboardContainer = document.getElementById('leaderboard'); // Контейнер для Топа
        const now = new Date();

        listContainer.innerHTML = data.map(user => {
            const lastSeenDate = new Date(user.last_seen);
            const isOnline = (now - lastSeenDate) < 30000; 

            return `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#e0aaff'}">
                        ${isOnline ? '<div class="online-badge"></div>' : ''}
                    </div>
                    <div class="user-info">
                        <b>${user.username || 'Аноним'}</b>
                        <span>${user.status || 'Нет статуса'}</span>
                        ${renderBadges(user.badges)} </div>
                    <div class="time-badge">⏳ ${formatTime(user.study_time || 0)}</div>
                </div>
            `;
        }).join('');

        // НОВАЯ ФУНКЦИЯ: Генерация и сортировка ТОП-5 студентов по времени учебы
        const sortedUsers = [...data].sort((a, b) => (b.study_time || 0) - (a.study_time || 0));
        leaderboardContainer.innerHTML = sortedUsers.slice(0, 5).map((user, index) => `
            <div class="leader-item">
                <div><span class="leader-rank">#${index + 1}</span>${user.username || 'Аноним'}</div>
                <strong>${formatTime(user.study_time || 0)}</strong>
            </div>
        `).join('');

        const { data: { user } } = await sb_client.auth.getUser();
        if (user) {
            const displayName = user.user_metadata.full_name || user.email.split('@')[0];
            document.getElementById('myInfo').innerText = `Привет, ${displayName}! 🔮`;
            document.getElementById('status-box').style.display = 'block';
            document.getElementById('chatInputArea').style.display = 'flex';
            document.getElementById('chatGuestNotice').style.display = 'none';

            const currentUserData = data.find(u => u.id === user.id);
            if (currentUserData) {
                document.getElementById('myStudyTime').innerText = `Время вашей учебы: ${formatTime(currentUserData.study_time || 0)}`;
                
                // Отображение личных текстовых значков в твоем профиле
                document.getElementById('myBadgesRow').innerHTML = "Ваши награды: " + (renderBadges(currentUserData.badges) || 'Пока нет 🐾');
                
                // Синхронизируем состояние кнопок при перезагрузке страницы
                if (currentUserData.status === '📚 Учусь' && !isStudying) {
                    isStudying = true;
                    if(!currentSessionStartTime) currentSessionStartTime = new Date();
                    const btn = document.getElementById('sessionBtn');
                    btn.innerText = "⏹ Завершить сессию";
                    btn.className = "btn-session-stop";
                }
            }
        } else {
            document.getElementById('myInfo').innerHTML = `Войдите, чтобы ставить статусы:<br>
                <button class="btn-google" onclick="login()">🔵 Войти через Google</button>`;
            document.getElementById('status-box').style.display = 'none';
            document.getElementById('chatInputArea').style.display = 'none';
            document.getElementById('chatGuestNotice').style.display = 'block';
        }
    }

    // ЛОГИКА ЧАТА
    async function sendChatMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        const { data: { user } } = await sb_client.auth.getUser();
        if (!user) return;

        const name = user.user_metadata.full_name || user.email.split('@')[0];

        const { error } = await sb_client.from('chat_messages').insert({
            user_id: user.id,
            username: name,
            message: text
        });

        if (error) console.error(error);

        // НОВАЯ ФУНКЦИЯ: Подсчет количества сообщений и выдача ачивки "Активист"
        const { data: profile } = await sb_client.from('profiles').select('msg_count, badges').eq('id', user.id).single();
        let currentCount = (profile?.msg_count || 0) + 1;
        let currentBadges = profile?.badges || [];

        if (currentCount >= 20 && !currentBadges.includes('activist')) {
            currentBadges.push('activist');
            alert("Поздравляем! Вы заработали значок 🔮 Активист за 20 сообщений!");
        }

        await sb_client.from('profiles').update({ msg_count: currentCount, badges: currentBadges }).eq('id', user.id);

        input.value = '';
        fetchChat();
    }

    async function fetchChat() {
        const { data, error } = await sb_client.from('chat_messages').select('*').order('created_at', { ascending: true }).limit(50);
        if (error) return;

        const chatContainer = document.getElementById('chatMessages');
        chatContainer.innerHTML = data.map(msg => `
            <div class="chat-msg"><b>${msg.username}:</b> ${msg.message}</div>
        `).join('');
        
        // Автоматическая прокрутка чата вниз
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // ТАЙМЕРЫ
    setInterval(async () => {
        const { data: { user } } = await sb_client.auth.getUser();
        if (!user) return;

        // Каждые 5 секунд говорим базе, что мы онлайн
        await sb_client.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', user.id);

        // Если запущена сессия учебы, прибавляем 5 секунд
        if (isStudying) {
            const { data: currentProfile } = await sb_client.from('profiles').select('study_time, badges').eq('id', user.id).single();
            let newTime = (currentProfile?.study_time || 0) + 5;
            let currentBadges = currentProfile?.badges || [];

            // НОВАЯ ФУНКЦИЯ: Проверка ачивки "Марафонец" (если учится дольше 2 часов = 7200 секунд)
            if (currentSessionStartTime) {
                const sessionSeconds = Math.floor((new Date() - currentSessionStartTime) / 1000);
                if (sessionSeconds >= 7200 && !currentBadges.includes('marathon')) {
                    currentBadges.push('marathon');
                    alert("Невероятно! Вы получили значок ⚡ Марафонец за длинную сессию усердия!");
                }
            }

            await sb_client.from('profiles').update({ study_time: newTime, badges: currentBadges }).eq('id', user.id);
        }
    }, 5000);

    // Первичный запуск и циклы обновления экранов
    fetchGroup();
    fetchChat();
    setInterval(fetchGroup, 5000);
    setInterval(fetchChat, 4000); // Чат обновляется чуть чаще
</script>

</body>
</html>

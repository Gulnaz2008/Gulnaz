<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://urxuxcaijnyagknanogv.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInRefiI6InVyeHV4Y2Fpam55YWdrbmFub2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODA2MTAsImV4cCI6MjA5MjI1NjYxMH0.a4VMlgaEiZknBNl-eazc6Ry37syVjnKanPtn14F7XeA';
    const supabase = createClient(URL, KEY);

    let MY_ID = null;
    let MY_NAME = "Пользователь";

    // Функция входа через Google
    async function loginWithGoogle() {
        const { error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.href
            }
        });
        if (error) console.error("Ошибка входа через Google:", error.message);
    }

    // Функция выхода
    async function logout() {
        await supabase.auth.signOut();
        window.location.reload();
    }

    // Слушатель состояния авторизации Supabase
    supabase.auth.onAuthStateChange(async (event, session) => {
        const loginBtn = document.getElementById('loginBtn');
        const profileContent = document.getElementById('profileContent');

        if (session && session.user) {
            MY_ID = session.user.id; 
            // Берем имя из Google профиля
            MY_NAME = session.user.user_metadata.full_name || session.user.email.split('@')[0];

            loginBtn.classList.add('hidden');
            profileContent.classList.remove('hidden');
            
            // Проверяем, есть ли мы в таблице Gulnaz, если нет — создаем строчку
            await checkAndCreateUser();
            fetchGroup();
        } else {
            MY_ID = null;
            loginBtn.classList.remove('hidden');
            profileContent.classList.add('hidden');
            document.getElementById('myInfo').innerText = "Пожалуйста, авторизуйтесь.";
        }
    });

    // Функция проверки и автоматического добавления пользователя в базу
    async function checkAndCreateUser() {
        if (!MY_ID) return;
        
        const { data, error } = await supabase
            .from('Gulnaz')
            .select('*')
            .eq('id', MY_ID);

        // Если пользователя с таким Google ID еще нет в таблице — добавляем его
        if (!error && (!data || data.length === 0)) {
            await supabase
                .from('Gulnaz')
                .insert([{ id: MY_ID, username: MY_NAME, status: '👋 Только вошел', color: '#666666' }]);
        }
    }

    // Привязка функций к кнопкам
    document.getElementById('loginBtn').addEventListener('click', loginWithGoogle);
    document.getElementById('logoutBtn').addEventListener('click', logout);

    // Функция смены статуса
    window.changeStatus = async (statusText, colorCode) => {
        if (!MY_ID) {
            alert("Вы не авторизованы!");
            return;
        }
        
        const { error } = await supabase
            .from('Gulnaz')
            .update({ status: statusText, color: colorCode })
            .eq('id', MY_ID);

        if (error) {
            console.error("Ошибка обновления статуса:", error);
            alert("Не удалось обновить: " + error.message);
        } else {
            fetchGroup(); 
        }
    };

    async function fetchGroup() {
        try {
            const { data, error } = await supabase
                .from('Gulnaz')
                .select('*')
                .order('username', { ascending: true });

            if (error) throw error;

            const list = document.getElementById('groupList');
            if (data && data.length > 0) {
                list.innerHTML = data.map(user => `
                    <div class="user-item">
                        <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                        <div>
                            <strong style="color: #9c27b0;">${user.username || 'Без имени'}</strong><br>
                            <small style="color: #666;">${user.status || 'Нет статуса'}</small>
                        </div>
                    </div>
                `).join('');

                if (MY_ID) {
                    const me = data.find(u => u.id === MY_ID);
                    if (me) {
                        document.getElementById('myInfo').innerText = `Привет, ${me.username}!`;
                    }
                }
            } else {
                list.innerHTML = "В таблице нет данных.";
            }
        } catch (err) {
            console.error("Ошибка загрузки данных:", err);
            document.getElementById('groupList').innerText = "Ошибка загрузки данных.";
        }
    }

    // Запуск и интервал обновления
    fetchGroup();
    setInterval(fetchGroup, 5000);
</script>

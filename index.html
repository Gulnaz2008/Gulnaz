<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов - Gulnaz</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(155, 89, 182, 0.15);
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        .status-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        button { cursor: pointer; transition: 0.3s; font-weight: 600; border-radius: 12px; padding: 12px 20px; border: none; color: white; }
        .btn-study { background: #4CAF50; }
        .btn-rest { background: #FFC107; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        .post { background: white; border-radius: 15px; padding: 18px; margin-top: 15px; width: 100%; max-width: 500px; box-sizing: border-box; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: left; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
        #feed { width: 100%; max-width: 500px; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="color: #4a148c; margin-top: 0;">✨ Мой статус</h3>
    <div class="status-buttons">
        <button class="btn-study" onclick="window.changeStatus('📚 Учусь', '#4CAF50')">📚 Учусь</button>
        <button class="btn-rest" onclick="window.changeStatus('☕ Отдыхаю', '#FFC107')">☕ Отдых</button>
    </div>
</div>

<div id="feed"></div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://urxuxcaijnyagknanogv.supabase.co'; 
    
    // ВАЖНО: СЮДА НУЖНО ВСТАВИТЬ ПОЛНЫЙ КЛЮЧ ИЗ SUPABASE БЕЗ ТОЧЕК В КОНЦЕ
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyeHV4Y2Fpam55YWdrbmFub2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODA2MTAsImV4cCI6MjA5MjI1NjYxMH0.a4VMlgaEiZknBNl-eazc6Ry37syVjnKanPtn14F7XeA; 
    
    const supabase = createClient(URL, KEY);
    const MY_ID = '4bc5694e-89f8-47d9-9b60-2d3bd2439122'; 

    // Делаем функцию глобальной, чтобы кнопки её видели
    window.changeStatus = async (text, color) => {
        const { error } = await supabase
            .from('Gulnaz') 
            .update({ status: text, color: color })
            .eq('id', MY_ID);

        if (error) {
            alert("Ошибка обновления: " + error.message);
            console.error(error);
        } else {
            fetchGroup();
        }
    };

    async function fetchGroup() {
        const { data, error } = await supabase
            .from('Gulnaz')
            .select('*')
            .order('username', { ascending: true });

        if (error) return console.error(error);

        const list = document.getElementById('feed');
        list.innerHTML = "";

        data.forEach(user => {
            const post = document.createElement("div");
            post.className = "post";
            post.innerHTML = `
                <div class="post-header">
                    <div class="status-dot" style="background:${user.color || '#ccc'}"></div>
                    <b>${user.username}</b>
                </div>
                <p style="margin: 5px 0 0 22px;">${user.status || 'Статус не задан'}</p>
            `;
            list.appendChild(post);
        });
    }

    fetchGroup();
    setInterval(fetchGroup, 5000);
</script>

</body>
</html>

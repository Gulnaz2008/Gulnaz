<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaaS - Чат</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3e5f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .auth-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; }
        button { cursor: pointer; padding: 10px; border-radius: 8px; border: none; font-weight: bold; }
        #loginBtn { background: #007bff; color: white; width: 100%; font-size: 18px; }
        .logout-btn { background: #ff4757; color: white; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        #usersList { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .user-card { cursor: pointer; text-align: center; min-width: 60px; }
        .user-card img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid transparent; }
        .user-card.active img { border-color: #9c27b0; }
        #messagesDisplay { height: 250px; overflow-y: auto; background: #fafafa; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; }
        .msg.sent { align-self: flex-end; background: #9c27b0; color: white; }
        .msg.received { align-self: flex-start; background: #eee; }
        .post { background: white; padding: 15px; border-radius: 15px; margin-top: 10px; width: 100%; max-width: 500px; }
    </style>
</head>
<body>

<div id="authSection" class="container" style="text-align: center;">
    <button id="loginBtn">Войти через Google</button>
    <div id="userInfo" style="display: none;" class="auth-bar">
        <img id="userPhoto" class="user-avatar" src="">
        <b id="userName" style="flex-grow: 1; text-align: left;"></b>
        <button id="logoutBtn" class="logout-btn">Выйти</button>
    </div>
</div>

<div id="dmSection" class="container" style="display: none;">
    <h3>💬 Личные сообщения</h3>
    <div id="usersList"></div>
    <div id="chatWindow" style="display: none;">
        <div id="messagesDisplay"></div>
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <input type="text" id="dmInput" placeholder="Сообщение...">
            <button id="sendDmBtn" style="background: #9c27b0; color: white;">➤</button>
        </div>
    </div>
</div>

<div id="messageForm" class="container" style="display: none;">
    <h3>✨ Создать пост</h3>
    <input type="text" id="content" placeholder="Текст поста...">
    <button id="mainBtn" style="background: #9c27b0; color: white; width: 100%;">Опубликовать</button>
</div>

<div id="feed"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWQP2kf_fpAidqN68FIRxYCYVaHhdabgI",
        authDomain: "gulnaz-a1c58.firebaseapp.com",
        projectId: "gulnaz-a1c58",
        storageBucket: "gulnaz-a1c58.firebasestorage.app",
        messagingSenderId: "55261769559",
        appId: "1:55261769559:web:f8b87fe5e36dd449f49812"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let activePartnerId = null;
    let unsubMsgs = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('messageForm').style.display = 'block';
            document.getElementById('dmSection').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userPhoto').src = user.photoURL;
            loadUsers();
        } else {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider).catch(e => alert(e.message));
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

    document.getElementById('mainBtn').onclick = async () => {
        const text = document.getElementById('content').value;
        if (!text) return;
        await addDoc(collection(db, "requests"), {
            uid: auth.currentUser.uid,
            name: auth.currentUser.displayName,
            photo: auth.currentUser.photoURL,
            text: text,
            timestamp: serverTimestamp()
        });
        document.getElementById('content').value = "";
    };

    onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snaps) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snaps.forEach(d => {
            const data = d.data();
            const div = document.createElement('div');
            div.className = 'post';
            div.innerHTML = `<b>${data.name}</b><p>${data.text}</p>`;
            feed.appendChild(div);
        });
    });

    function loadUsers() {
        onSnapshot(collection(db, "requests"), (snaps) => {
            const list = document.getElementById('usersList');
            list.innerHTML = "";
            const seen = new Set();
            snaps.forEach(d => {
                const u = d.data();
                if (u.uid && u.uid !== auth.currentUser.uid && !seen.has(u.uid)) {
                    seen.add(u.uid);
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `<img src="${u.photo}"><div>${u.name.split(' ')[0]}</div>`;
                    card.onclick = () => {
                        document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
                        card.classList.add('active');
                        startChat(u.uid);
                    };
                    list.appendChild(card);
                }
            });
        });
    }

    function startChat(id) {
        activePartnerId = id;
        document.getElementById('chatWindow').style.display = 'block';
        if (unsubMsgs) unsubMsgs();
        unsubMsgs = onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snaps) => {
            const disp = document.getElementById('messagesDisplay');
            disp.innerHTML = "";
            snaps.forEach(d => {
                const m = d.data();
                if ((m.senderId === auth.currentUser.uid && m.receiverId === id) || 
                    (m.senderId === id && m.receiverId === auth.currentUser.uid)) {
                    const mDiv = document.createElement('div');
                    mDiv.className = `msg ${m.senderId === auth.currentUser.uid ? 'sent' : 'received'}`;
                    mDiv.innerText = m.text;
                    disp.appendChild(mDiv);
                }
            });
            disp.scrollTop = disp.scrollHeight;
        });
    }

    document.getElementById('sendDmBtn').onclick = async () => {
        const input = document.getElementById('dmInput');
        if (!input.value || !activePartnerId) return;
        await addDoc(collection(db, "messages"), {
            senderId: auth.currentUser.uid,
            receiverId: activePartnerId,
            text: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Purple Data Control</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container, #feed { width: 100%; max-width: 480px; }

        /* Панель управления */
        .container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        h3 { text-align: center; color: #6a11cb; margin-bottom: 15px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #eee;
            border-radius: 10px;
            outline: none;
        }

        button#mainBtn {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Посты */
        .post {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            position: relative;
        }

        .postHeader { display: flex; align-items: center; margin-bottom: 12px; }

        .avatar {
            width: 45px; height: 45px; border-radius: 50%;
            background: #6a11cb; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; margin-right: 12px;
        }

        .del-btn {
            position: absolute; top: 15px; right: 15px;
            background: none; border: none; cursor: pointer; opacity: 0.3;
        }
        .del-btn:hover { opacity: 1; color: red; }

        .like-btn {
            background: #f3e8ff; color: #6a11cb; border: none;
            padding: 7px 15px; border-radius: 20px; cursor: pointer;
            font-weight: bold; margin: 10px 0;
        }

        /* Секция комментариев */
        .comment-box { border-top: 1px solid #f0f0f0; margin-top: 10px; padding-top: 10px; }
        
        .comm-input { width: 75%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
        
        .comm-send { 
            width: 22%; padding: 8px; background: #6a11cb; color: white; 
            border: none; border-radius: 8px; cursor: pointer;
        }

        .comment-list { margin-top: 10px; font-size: 13px; color: #444; }
        .comment-item { background: #f8f5ff; padding: 6px; border-radius: 6px; margin: 4px 0; }
    </style>
</head>
<body>

<div class="container">
    <h3>💜 Панель управления</h3>
    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">
    <button id="mainBtn">Опубликовать в облако</button>
</div>

<div id="feed"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
        getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
        serverTimestamp, updateDoc, doc, increment, arrayUnion, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWQP2kf_fpAidqN68FIRxYCYVaHhdabgI",
        authDomain: "gulnaz-a1c58.firebaseapp.com",
        projectId: "gulnaz-a1c58",
        storageBucket: "gulnaz-a1c58.appspot.com",
        messagingSenderId: "55261769559",
        appId: "1:55261769559:web:f8b87fe5e36dd449f49812"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Функции в глобальную область
    window.processLike = async (id) => {
        await updateDoc(doc(db, "requests", id), { likes: increment(1) });
    };

    window.addComment = async (id, inputId) => {
        const text = document.getElementById(inputId).value;
        if (!text) return;
        await updateDoc(doc(db, "requests", id), {
            comments: arrayUnion({ text, date: Date.now() })
        });
    };

    window.deletePost = async (id) => {
        if(confirm("Удалить этот пост?")) await deleteDoc(doc(db, "requests", id));
    };

    // Создание поста
    document.getElementById('mainBtn').onclick = async () => {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        if(!name || !email) return alert("Заполни поля!");

        await addDoc(collection(db, "requests"), {
            name, email, likes: 0, comments: [], timestamp: serverTimestamp()
        });
        document.getElementById('name').value = "";
        document.getElementById('email').value = "";
    };

    // Лента
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snap.forEach((docItem) => {
            const d = docItem.data();
            const id = docItem.id;
            const letter = d.name ? d.name[0].toUpperCase() : "?";
            
            const post = document.createElement("div");
            post.className = "post";
            post.innerHTML = `
                <button class="del-btn" onclick="deletePost('${id}')">🗑</button>
                <div class="postHeader">
                    <div class="avatar">${letter}</div>
                    <div>
                        <b>${d.name}</b><br>
                        <small style="color:#888">${d.email}</small>
                    </div>
                </div>
                <button class="like-btn" onclick="processLike('${id}')">💜 ${d.likes || 0}</button>
                
                <div class="comment-box">
                    <input class="comm-input" id="in-${id}" placeholder="Ваш комментарий...">
                    <button class="comm-send" onclick="addComment('${id}', 'in-${id}')">></button>
                    <div class="comment-list">
                        ${(d.comments || []).map(c => `<div class="comment-item">💬 ${c.text}</div>`).join('')}
                    </div>
                </div>
            `;
            feed.appendChild(post);
        });
    });
</script>
</body>
</html>

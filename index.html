<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Purple Firebase Feed</title>
    <style>
        /* 1. Глобальный сброс, чтобы padding не ломал ширину */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            background-attachment: fixed; /* Чтобы фон не прерывался */
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container, #feed {
            width: 100%;
            max-width: 450px; /* Одинаковая ширина для всех блоков */
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h3 {
            text-align: center;
            color: #6a11cb;
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #eee;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #6a11cb;
        }

        #mainBtn {
            width: 100%;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            font-weight: bold;
            border: none;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        #mainBtn:hover {
            opacity: 0.9;
        }

        /* Посты в ленте */
        .post {
            background: white;
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .postHeader {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            margin-right: 12px;
            flex-shrink: 0; /* Чтобы аватар не сжимался */
        }

        .userInfo b {
            display: block;
            color: #333;
            font-size: 16px;
        }

        .userInfo small {
            color: #777;
        }

        .like-btn {
            background: #f3e8ff;
            color: #6a11cb;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .comment-section {
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
        }

        .sendBtn {
            background: #6a11cb;
            color: white;
            width: 100%;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 5px;
        }

        .comments {
            margin-top: 15px;
        }

        .comments p {
            background: #f8f5ff;
            padding: 10px;
            border-radius: 10px;
            margin: 8px 0;
            font-size: 14px;
            color: #444;
            border-left: 3px solid #6a11cb;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>💜 Purple Firebase Feed</h3>
    <input id="name" placeholder="Ваше имя">
    <input id="email" placeholder="Ваш Email">
    <button id="mainBtn">Опубликовать</button>
</div>

<div id="feed"></div>

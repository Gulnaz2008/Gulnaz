<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS - Облачная регистрация</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        button#mainBtn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        button#mainBtn:hover {
            background: #0056b3;
        }

        .post {
            background: #fff;
            border: 1px solid #eaeaea;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            width: 100%;
        }

        .like-btn {
            cursor: pointer;
            border: none;
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 20px;
            margin-top: 5px;
        }

        .like-btn:hover {
            background: #e9ecef;
        }

        .time {
            font-size: 11px;
            color: #999;
            float: right;
        }

        .comments {
            margin-top: 10px;
            font-size: 12px;
            color: #333;
        }

        .commentInput {
            width: 100%;
            padding: 6px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="container">
    <h3>Панель управления данными</h3>

    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Email">

    <button id="mainBtn">Опубликовать</button>
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot,
    serverTimestamp,
    updateDoc,
    doc,
    increment,
    arrayUnion
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAWQP2kf_fpAidqN68FIRxYCYVaHhdabgI",
    authDomain: "gulnaz-a1c58.firebaseapp.com",
    projectId: "gulnaz-a1c58",
    storageBucket: "gulnaz-a1c58.appspot.com",
    messagingSenderId: "55261769559",
    appId: "1:55261769559:web:f8b87fe5e36dd449f49812"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👍 ЛАЙК
window.processLike = async (id) => {
    try {
        const ref = doc(db, "requests", id);
        await updateDoc(ref, {
            likes: increment(1)
        });
    } catch (e) {
        console.error(e);
    }
};

// 💬 КОММЕНТАРИЙ
window.addComment = async (id, text) => {
    try {
        const ref = doc(db, "requests", id);

        await updateDoc(ref, {
            comments: arrayUnion({
                text: text,
                createdAt: new Date()
            })
        });
    } catch (e) {
        console.error(e);
    }
};

// 📤 ОТПРАВКА ПОСТА
document.getElementById("mainBtn").onclick = async () => {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();

    if (!name || !email) {
        alert("Заполните поля!");
        return;
    }

    await addDoc(collection(db, "requests"), {
        name,
        email,
        likes: 0,
        comments: [],
        timestamp: serverTimestamp()
    });

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
};

// 📡 ЛЕНТА
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snapshot.forEach((docItem) => {
        const data = docItem.data();

        const time = data.timestamp
            ? data.timestamp.toDate().toLocaleTimeString()
            : "...";

        const post = document.createElement("div");
        post.className = "post";

        post.innerHTML = `
            <span class="time">${time}</span>
            <b>${data.name}</b>
            <p>${data.email}</p>

            <button class="like-btn">
                👍 ${data.likes || 0}
            </button>

            <input class="commentInput" placeholder="Комментарий...">
            <button class="like-btn sendBtn">Отправить</button>

            <div class="comments">
                ${(data.comments || []).map(c =>
                    `<p>💬 ${c.text}</p>`
                ).join("")}
            </div>
        `;

        // 👍 лайк
        post.querySelector(".like-btn").onclick = () =>
            processLike(docItem.id);

        // 💬 комментарий
        const input = post.querySelector(".commentInput");
        post.querySelector(".sendBtn").onclick = () => {
            if (!input.value.trim()) return;
            addComment(docItem.id, input.value.trim());
            input.value = "";
        };

        feed.appendChild(post);
    });
});
</script>

</body>
</html>

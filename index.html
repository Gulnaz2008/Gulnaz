<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS</title>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        button:disabled {
            background: #ccc;
        }

        .post {
            background: #fff;
            border: 1px solid #eaeaea;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
        }

        .like-btn {
            cursor: pointer;
            border: none;
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 20px;
        }

        .time {
            font-size: 11px;
            color: #999;
            float: right;
        }
    </style>
</head>

<body>

<div class="container">
    <h3>Панель управления данными</h3>

    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">

    <button id="mainBtn">Опубликовать в облако</button>
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
        getFirestore,
        collection,
        addDoc,
        query,
        orderBy,
        onSnapshot,
        serverTimestamp,
        updateDoc,
        doc,
        increment
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWQP2kf_fpAidqN68FIRxYCYVaHhdabgI",
        authDomain: "gulnaz-a1c58.firebaseapp.com",
        projectId: "gulnaz-a1c58",
        storageBucket: "gulnaz-a1c58.firebasestorage.app",
        messagingSenderId: "55261769559",
        appId: "1:55261769559:web:f8b87fe5e36dd449f49812",
        measurementId: "G-C548RP728S"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 👍 ЛАЙК
    window.processLike = async (id) => {
        try {
            const docRef = doc(db, "requests", id);
            await updateDoc(docRef, {
                likes: increment(1)
            });
        } catch (e) {
            console.error("Ошибка лайка:", e.message);
        }
    };

    // 📤 ОТПРАВКА
    document.getElementById('mainBtn').onclick = async () => {
        const btn = document.getElementById('mainBtn');
        btn.disabled = true;

        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();

        // ✅ ВАЛИДАЦИЯ
        if (!name || !email) {
            alert("Заполните все поля!");
            btn.disabled = false;
            return;
        }

        try {
            await addDoc(collection(db, "requests"), {
                name: name,
                email: email,
                likes: 0,
                timestamp: serverTimestamp()
            });

            // очистка полей
            document.getElementById('name').value = "";
            document.getElementById('email').value = "";

        } catch (e) {
            alert("Ошибка безопасности или подключения!");
            console.error(e);
        }

        btn.disabled = false;
    };

    // 🔄 REALTIME ЛЕНТА
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";

        snapshot.forEach((docItem) => {
            const data = docItem.data();

            const time = data.timestamp
                ? data.timestamp.toDate().toLocaleTimeString()
                : "...";
            
            feed.innerHTML += `
                <div class="post">
                    <span class="time">${time}</span>
                    <b>${data.name}</b>
                    <p>${data.email}</p>
                    <button class="like-btn" onclick="processLike('${docItem.id}')">
                        👍 ${data.likes || 0}
                    </button>
                </div>
            `;
        });
    });
</script>

</body>
</html>

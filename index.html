<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaaS - Посты и Личные сообщения</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(155, 89, 182, 0.15);
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .auth-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; width: 100%; max-width: 500px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #9c27b0; object-fit: cover; }
        
        button { cursor: pointer; transition: 0.3s; font-weight: 600; border-radius: 6px; padding: 12px; border: none; }
        #loginBtn { background: #007bff; color: white; width: 100%; max-width: 500px; }
        .logout-btn { background: #ff4757; color: white; padding: 8px 15px; }

        input { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #f3e5f5; border-radius: 12px; box-sizing: border-box; outline: none; }
        
        button#mainBtn, #sendDmBtn {
            background: linear-gradient(45deg, #ba68c8, #9c27b0);
            color: white;
        }

        /* --- Стили DM --- */
        .users-list { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; }
        .user-item { cursor: pointer; text-align: center; min-width: 65px; transition: 0.2s; }
        .user-item:hover { transform: scale(1.05); }
        .user-item img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #ce93d8; }
        .user-item span { font-size: 11px; color: #4a148c; display: block; margin-top: 4px; }

        #activeChat { display: none; border-top: 1px solid #e1bee7; padding-top: 15px; margin-top: 10px; }
        .messages-display { height: 200px; overflow-y: auto; background: rgba(255,255,255,0.5); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 13px; line-height: 1.4; }
        .msg.sent { background: #9c27b0; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #f1f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* --- Стили Ленты --- */
        .post { background: white; border-radius: 15px; padding: 18px; margin-top: 15px; width: 100%; max-width: 500px; box-sizing: border-box; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-avatar { width: 30px; height: 30px; border-radius: 50%; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; }
        .like-btn { cursor: pointer; border: 1px solid #f3e5f5; background: #fffafa; padding: 6px 15px; border-radius: 20px; color: #8e24aa; }
        .time { font-size: 11px; color: #ab47bc; float: right; }
    </style>
</head>
<body>

<div id="authSection" style="text-align: center; width: 100%; display: flex; justify-content: center;">
    <button id="loginBtn">Войти через Google 💖</button>
    <div id="userInfo" style="display: none;" class="auth-bar">
        <img id="userPhoto" class="user-avatar" src="" alt="Avatar">
        <span id="userName" style="font-weight: bold; flex-grow: 1; text-align: left;"></span>
        <button id="logoutBtn" class="logout-btn">Выйти</button>
    </div>
</div>

<div id="dmContainer" class="container" style="display: none;">
    <h3 style="margin: 0 0 10px 0; color: #4a148c; font-size: 18px; text-align: center;">💬 Мессенджер</h3>
    <div id="usersList" class="users-list">
        </div>

    <div id="activeChat">
        <h4 id="chatWithTitle" style="margin: 0 0 10px 0; font-size: 13px; color: #7b1fa2;"></h4>
        <div id="messagesDisplay" class="messages-display"></div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="dmInput" placeholder="Напишите сообщение..." style="margin: 0;">
            <button id="sendDmBtn" style="width: 60px;">➤</button>
        </div>
    </div>
</div>

<div id="messageForm" class="container" style="display: none;">
    <h3 style="text-align: center; margin-top: 0; color: #4a148c;">✨ Новый пост</h3>
    <input type="text" id="content" placeholder="О чем вы думаете?">
    <input type="text" id="photoUrlInput" placeholder="Ссылка на картинку (URL)...">
    <button id="mainBtn">Опубликовать</button>
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWQP2kf_fpAidqN68FIRxYCYVaHhdabgI",
        authDomain: "gulnaz-a1c58.firebaseapp.com",
        projectId: "gulnaz-a1c58",
        storageBucket: "gulnaz-a1c58.firebasestorage.app",
        messagingSenderId: "55261769559",
        appId: "1:55261769559:web:f8b87fe5e36dd449f49812"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let selectedUserId = null;
    let chatUnsub = null;

    // --- АВТОРИЗАЦИЯ ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('messageForm').style.display = 'block';
            document.getElementById('dmContainer').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userPhoto').src = user.photoURL;

            // Сохраняем пользователя в список контактов
            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                displayName: user.displayName,
                photoURL: user.photoURL
            }, { merge: true });

            loadUsers(user.uid);
        } else {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('messageForm').style.display = 'none';
            document.getElementById('dmContainer').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

    // --- ЛОГИКА DM (Личные сообщения) ---
    function loadUsers(myUid) {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById("usersList");
            list.innerHTML = "";
            snap.forEach(uDoc => {
                const user = uDoc.data();
                if (user.uid !== myUid) {
                    const item = document.createElement("div");
                    item.className = "user-item";
                    item.innerHTML = `
                        <img src="${user.photoURL}">
                        <span>${user.displayName.split(' ')[0]}</span>
                    `;
                    item.onclick = () => openChat(user.uid, user.displayName);
                    list.appendChild(item);
                }
            });
        });
    }

    function openChat(targetUid, targetName) {
        selectedUserId = targetUid;
        document.getElementById("activeChat").style.display = "block";
        document.getElementById("chatWithTitle").innerText = `Чат с ${targetName}`;
        
        if (chatUnsub) chatUnsub();

        const myUid = auth.currentUser.uid;
        // Создаем уникальный ID комнаты для двух людей
        const chatId = myUid < targetUid ? `${myUid}_${targetUid}` : `${targetUid}_${myUid}`;

        const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
        chatUnsub = onSnapshot(q, (snap) => {
            const box = document.getElementById("messagesDisplay");
            box.innerHTML = "";
            snap.forEach(mDoc => {
                const m = mDoc.data();
                const side = m.senderId === myUid ? "sent" : "received";
                const div = document.createElement("div");
                div.className = `msg ${side}`;
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    document.getElementById("sendDmBtn").onclick = async () => {
        const input = document.getElementById("dmInput");
        const val = input.value.trim();
        if (!val || !selectedUserId) return;

        const myUid = auth.currentUser.uid;
        const chatId = myUid < selectedUserId ? `${myUid}_${selectedUserId}` : `${selectedUserId}_${myUid}`;

        await addDoc(collection(db, "chats", chatId, "messages"), {
            senderId: myUid,
            text: val,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    // --- ЛОГИКА ПОСТОВ ---
    document.getElementById('mainBtn').onclick = async () => {
        const content = document.getElementById('content').value.trim();
        const photoUrl = document.getElementById('photoUrlInput').value.trim();
        if(!content) return alert("Введите текст!");

        await addDoc(collection(db, "requests"), {
            name: auth.currentUser.displayName,
            photo: auth.currentUser.photoURL,
            postImage: photoUrl,
            text: content,
            likes: 0,
            timestamp: serverTimestamp()
        });
        document.getElementById('content').value = "";
        document.getElementById('photoUrlInput').value = "";
    };

    onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snapshot.forEach((docItem) => {
            const data = docItem.data();
            const post = document.createElement("div");
            post.className = "post";
            post.innerHTML = `
                <div class="post-header">
                    <img src="${data.photo}" class="post-avatar">
                    <b>${data.name}</b>
                    <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
                </div>
                <p>${data.text}</p>
                ${data.postImage ? `<img src="${data.postImage}" class="post-img" onerror="this.style.display='none'">` : ''}
                <button class="like-btn" onclick="processLike('${docItem.id}')">👍 ${data.likes || 0}</button>
            `;
            feed.appendChild(post);
        });
    });

    window.processLike = async (id) => {
        await updateDoc(doc(db, "requests", id), { likes: increment(1) });
    };
</script>
</body>
</html>

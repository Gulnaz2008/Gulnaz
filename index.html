<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS - Облачная регистрация</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .leaders-panel {
            background: #fff;
            border: 2px solid #ffd700;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .leader-item {
            display: inline-block;
            margin: 0 10px;
            font-size: 14px;
        }
        .leader-rank { color: #ffd700; font-weight: bold; font-size: 18px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button#mainBtn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }
        .post {
            background: #fff;
            border: 1px solid #eaeaea;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            position: relative;
        }
        .like-btn {
            cursor: pointer;
            border: none;
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 20px;
        }
        .time { font-size: 11px; color: #999; float: right; }
        .search-box { border-left: 4px solid #007bff; background: #eef6ff; }
    </style>
</head>
<body>

<div class="container leaders-panel">
    <h4 style="margin: 0 0 10px 0;">🏆 Зал славы (Топ-3)</h4>
    <div id="leadersList">Загрузка чемпионов...</div>
</div>

<div class="container">
    <h3>Панель управления данными</h3>
    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">
    <button id="mainBtn">Опубликовать в облако</button>
</div>

<div class="container search-box">
    <input type="text" id="searchInput" placeholder="🔍 Введите точное имя для поиска...">
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
        getFirestore, collection, addDoc, query, orderBy, limit,
        onSnapshot, serverTimestamp, updateDoc, doc, increment, where
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWQP2kf_fpAidqN68FIRxYCYVaHhdabgI",
        authDomain: "gulnaz-a1c58.firebaseapp.com",
        projectId: "gulnaz-a1c58",
        storageBucket: "gulnaz-a1c58.appspot.com",
        messagingSenderId: "55261769559",
        appId: "1:55261769559:web:f8b87fe5e36dd449f49812"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. ТОП ЛИДЕРОВ
    const syncLeaders = () => {
        const qLeaders = query(collection(db, "requests"), orderBy("likes", "desc"), limit(3));
        onSnapshot(qLeaders, (snap) => {
            const list = document.getElementById('leadersList');
            list.innerHTML = "";
            let rank = 1;
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <div class="leader-item">
                        <div class="leader-rank">#${rank}</div>
                        <b>${data.name}</b><br>
                        <small>👍 ${data.likes || 0}</small>
                    </div>`;
                rank++;
            });
        });
    };

    // 2. ИСПРАВЛЕННАЯ ЛЕНТА (Поиск теперь не конфликтует с индексами)
    const renderFeed = (filterName = "") => {
        const colRef = collection(db, "requests");
        let q;

        if (filterName) {
            // ВАЖНО: Убираем orderBy при поиске, чтобы не ломать базу без индексов
            q = query(colRef, where("name", "==", filterName));
        } else {
            // Обычная лента с сортировкой по времени
            q = query(colRef, orderBy("timestamp", "desc"));
        }

        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((docItem) => {
                const data = docItem.data();
                const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "...";
                const post = document.createElement("div");
                post.className = "post";
                post.innerHTML = `
                    <span class="time">${time}</span>
                    <b>${data.name}</b>
                    <p style="margin: 5px 0; color: #555;">${data.email}</p>
                    <button class="like-btn" onclick="processLike('${docItem.id}')">
                        👍 ${data.likes || 0}
                    </button>
                `;
                feed.appendChild(post);
            });
        }, (error) => {
            console.error("Ошибка Firestore:", error);
        });
    };

    window.processLike = async (id) => {
        try {
            await updateDoc(doc(db, "requests", id), { likes: increment(1) });
        } catch(e) { console.error(e); }
    };

    document.getElementById('searchInput').oninput = (e) => {
        renderFeed(e.target.value.trim());
    };

    document.getElementById('mainBtn').onclick = async () => {
        const n = document.getElementById('name').value.trim();
        const e = document.getElementById('email').value.trim();
        if(!n || !e) return alert("Заполни поля!");

        try {
            await addDoc(collection(db, "requests"), {
                name: n,
                email: e,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById('name').value = "";
            document.getElementById('email').value = "";
        } catch (err) {
            alert("Ошибка при добавлении!");
            console.error(err);
        }
    };

    renderFeed();
    syncLeaders();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaaS - Посты по ссылке</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(155, 89, 182, 0.15);
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .auth-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #9c27b0; }
        
        button { cursor: pointer; transition: 0.3s; font-weight: 600; border-radius: 6px; padding: 12px; border: none; }
        #loginBtn { background: #007bff; color: white; width: 100%; }
        .logout-btn { background: #ff4757; color: white; padding: 8px 15px; }

        input { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #f3e5f5; border-radius: 12px; box-sizing: border-box; }
        
        button#mainBtn {
            background: linear-gradient(45deg, #ba68c8, #9c27b0);
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .post {
            background: white;
            border-radius: 15px;
            padding: 18px;
            margin-top: 15px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-avatar { width: 30px; height: 30px; border-radius: 50%; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; }
        
        .like-btn { cursor: pointer; border: 1px solid #f3e5f5; background: #fffafa; padding: 6px 15px; border-radius: 20px; color: #8e24aa; }
        .time { font-size: 11px; color: #ab47bc; float: right; }
    </style>
</head>
<body>

<div id="authSection" class="container" style="text-align: center;">
    <button id="loginBtn">Войти через Google 💖</button>
    <div id="userInfo" style="display: none;" class="auth-bar">
        <img id="userPhoto" class="user-avatar" src="" alt="Avatar">
        <span id="userName" style="font-weight: bold;"></span>
        <button id="logoutBtn" class="logout-btn">Выйти</button>
    </div>
</div>

<div id="messageForm" class="container" style="display: none;">
    <h3 style="text-align: center; margin-top: 0; color: #4a148c;">✨ Новый пост</h3>
    <input type="text" id="content" placeholder="Ваше сообщение...">
    <input type="text" id="photoUrlInput" placeholder="Вставьте ссылку на картинку (URL)...">
    <button id="mainBtn">Опубликовать</button>
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWQP2kf_fpAidqN68FIRxYCYVaHhdabgI",
        authDomain: "gulnaz-a1c58.firebaseapp.com",
        projectId: "gulnaz-a1c58",
        storageBucket: "gulnaz-a1c58.firebasestorage.app",
        messagingSenderId: "55261769559",
        appId: "1:55261769559:web:f8b87fe5e36dd449f49812"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // --- АВТОРИЗАЦИЯ ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('messageForm').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userPhoto').src = user.photoURL;
        } else {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('messageForm').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // --- ПУБЛИКАЦИЯ ---
    document.getElementById('mainBtn').onclick = async () => {
        const content = document.getElementById('content').value.trim();
        const photoUrl = document.getElementById('photoUrlInput').value.trim();

        if(!content) return alert("Введите хотя бы текст!");

        try {
            await addDoc(collection(db, "requests"), {
                name: auth.currentUser.displayName,
                photo: auth.currentUser.photoURL,
                postImage: photoUrl, // Сохраняем просто как строку текста
                text: content,
                likes: 0,
                timestamp: serverTimestamp()
            });

            document.getElementById('content').value = "";
            document.getElementById('photoUrlInput').value = "";
        } catch (err) {
            alert("Ошибка! Вы не авторизованы.");
        }
    };

    // --- ЛЕНТА ---
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snapshot.forEach((docItem) => {
            const data = docItem.data();
            const post = document.createElement("div");
            post.className = "post";
            post.innerHTML = `
                <div class="post-header">
                    <img src="${data.photo}" class="post-avatar">
                    <b>${data.name}</b>
                    <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
                </div>
                <p>${data.text}</p>
                ${data.postImage ? `<img src="${data.postImage}" class="post-img" onerror="this.style.display='none'">` : ''}
                <button class="like-btn" onclick="processLike('${docItem.id}')">👍 ${data.likes || 0}</button>
            `;
            feed.appendChild(post);
        });
    });

    window.processLike = async (id) => {
        await updateDoc(doc(db, "requests", id), { likes: increment(1) });
    };
    window.db = db;
</script>
</body>
</html>
